<!doctype html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Test | Radioaktivitaet und ihr Nachweis</title>
  <style>
    :root {
      --bg: #0f223f;
      --panel: #142a4d;
      --line: rgba(255,255,255,0.14);
      --text: #f2f7ff;
      --muted: #9fb3cc;
      --ok: #14e3a1;
      --warn: #ff9f1a;
      --err: #ff8a8a;
      --radius: 14px;
    }

    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(180deg, #0f203a 0%, #102746 100%);
      color: var(--text);
      min-height: 100vh;
    }

    .wrap {
      max-width: 900px;
      margin: 24px auto;
      padding: 0 14px 24px;
    }

    .card {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      padding: 16px;
    }

    h1 {
      margin: 0 0 6px;
      font-size: 1.35rem;
    }

    .muted {
      color: var(--muted);
      margin: 0 0 16px;
    }

    .actions {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin: 0 0 14px;
    }

    a, button {
      border: 0;
      border-radius: 10px;
      padding: 10px 12px;
      font-weight: 700;
      text-decoration: none;
      cursor: pointer;
    }

    .btn-primary {
      background: linear-gradient(135deg, #2f9dff, #6b5bff);
      color: #fff;
    }

    .btn-secondary {
      background: linear-gradient(135deg, #ff9f1a, #ff5d7a);
      color: #fff;
    }

    .q {
      border-top: 1px solid var(--line);
      padding: 10px 0;
    }

    .q p {
      margin: 0 0 8px;
      font-weight: 700;
    }

    .q label {
      display: block;
      margin-bottom: 6px;
    }

    .ok { color: var(--ok); font-weight: 700; }
    .err { color: var(--err); font-weight: 700; }
    .hidden { display: none !important; }
  </style>
</head>
<body>
  <div class="wrap">
    <section class="card">
      <h1>Test: Radioaktivitaet und ihr Nachweis</h1>
      <p id="hinweis" class="muted">Dieser Test wird als eigene Seite geoeffnet.</p>

      <div class="actions">
        <a class="btn-secondary" href="../../übersicht_themen.html">Zur Themenuebersicht</a>
        <button class="btn-primary" type="button" id="submitBtn">Test abgeben</button>
      </div>

      <div id="questionsWrap"></div>
      <p id="msg"></p>
    </section>
  </div>

  <script>
    const params = new URLSearchParams(window.location.search);
    const topicId = Number(params.get("topicId") || 0);
    let token = localStorage.getItem("token") || "";
    let currentQuestions = [];

    function setMsg(text, ok) {
      const el = document.getElementById("msg");
      el.textContent = text;
      el.className = ok ? "ok" : "err";
    }

    async function api(path, options = {}) {
      const headers = options.headers || {};
      if (token) headers.Authorization = "Bearer " + token;
      if (!headers["Content-Type"] && options.body) headers["Content-Type"] = "application/json";
      const res = await fetch(path, { ...options, headers });
      const data = await res.json().catch(() => ({}));
      if (!res.ok) throw new Error(data.error || "Fehler");
      return data;
    }

    function escapeHtml(s) {
      return String(s)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll("\"", "&quot;")
        .replaceAll("'", "&#39;");
    }

    async function loadTest() {
      try {
        if (!token) throw new Error("Bitte zuerst auf der Startseite einloggen.");
        if (!topicId) throw new Error("Keine gueltige topicId uebergeben.");

        const data = await api(`/api/topics/${topicId}/questions`);
        currentQuestions = Array.isArray(data.questions) ? data.questions : [];

        const wrap = document.getElementById("questionsWrap");
        wrap.innerHTML = "";

        if (!currentQuestions.length) {
          setMsg("Keine Fragen gefunden.", false);
          return;
        }

        currentQuestions.forEach((q, i) => {
          const div = document.createElement("div");
          div.className = "q";
          div.innerHTML = `
            <p>${i + 1}. ${escapeHtml(q.question_text || "")}</p>
            <label><input type="radio" name="q_${q.id}" value="A"> A) ${escapeHtml(q.option_a || "")}</label>
            <label><input type="radio" name="q_${q.id}" value="B"> B) ${escapeHtml(q.option_b || "")}</label>
            <label><input type="radio" name="q_${q.id}" value="C"> C) ${escapeHtml(q.option_c || "")}</label>
            <label><input type="radio" name="q_${q.id}" value="D"> D) ${escapeHtml(q.option_d || "")}</label>
          `;
          wrap.appendChild(div);
        });

        setMsg("Test geladen. Bitte alle Fragen beantworten und dann abgeben.", true);
      } catch (e) {
        setMsg(e.message, false);
      }
    }

    async function submitTest() {
      try {
        const answers = currentQuestions.map((q) => {
          const checked = document.querySelector(`input[name="q_${q.id}"]:checked`);
          return checked ? { questionId: q.id, selectedOption: checked.value } : null;
        }).filter(Boolean);

        if (!answers.length) {
          setMsg("Bitte mindestens eine Antwort auswaehlen.", false);
          return;
        }

        const data = await api(`/api/topics/${topicId}/submit`, {
          method: "POST",
          body: JSON.stringify({ answers })
        });

        setMsg(`Gespeichert: ${data.correctAnswers}/${data.totalQuestions} | ${data.percent}% | Note ${data.grade}`, true);
        document.getElementById("submitBtn").classList.add("hidden");
      } catch (e) {
        setMsg(e.message, false);
      }
    }

    document.getElementById("submitBtn").addEventListener("click", submitTest);
    loadTest();
  </script>
</body>
</html>
