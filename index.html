<!doctype html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NT Testsystem | GRUMI</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Fredoka:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --pop-yellow: #FFE135;
      --pop-pink: #FF4081;
      --pop-blue: #2196F3;
      --pop-green: #00E676;
      --pop-orange: #FF9100;
      --pop-purple: #AA00FF;
      --bg-dark: #1a1a2e;
      --bg-card: #16213e;
      --bg-card-alt: #0f3460;
      --text-light: #f0f0f0;
      --text-muted: #a0b0c0;
      --radius: 18px;
      --shadow: 0 8px 32px rgba(0,0,0,0.3);
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Nunito', sans-serif;
      background: var(--bg-dark);
      color: var(--text-light);
      min-height: 100vh;
      overflow-x: hidden;
    }

    body::before {
      content: '';
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background:
        radial-gradient(circle at 10% 20%, rgba(255,64,129,0.12) 0%, transparent 50%),
        radial-gradient(circle at 80% 60%, rgba(33,150,243,0.12) 0%, transparent 50%),
        radial-gradient(circle at 50% 90%, rgba(0,230,118,0.1) 0%, transparent 50%),
        radial-gradient(circle at 90% 10%, rgba(170,0,255,0.08) 0%, transparent 40%);
      z-index: 0;
      pointer-events: none;
    }

    .bg-shapes {
      position: fixed;
      top: 0; left: 0; width: 100%; height: 100%;
      z-index: 0;
      pointer-events: none;
      overflow: hidden;
    }

    .bg-shapes span {
      position: absolute;
      border-radius: 50%;
      opacity: 0.07;
      animation: floatShape 20s infinite ease-in-out;
    }

    .bg-shapes span:nth-child(1) { width: 300px; height: 300px; background: var(--pop-pink); top: -5%; left: -5%; animation-delay: 0s; }
    .bg-shapes span:nth-child(2) { width: 200px; height: 200px; background: var(--pop-blue); top: 30%; right: -3%; animation-delay: -5s; }
    .bg-shapes span:nth-child(3) { width: 250px; height: 250px; background: var(--pop-green); bottom: 10%; left: 20%; animation-delay: -10s; border-radius: 30%; }
    .bg-shapes span:nth-child(4) { width: 180px; height: 180px; background: var(--pop-yellow); top: 60%; left: 60%; animation-delay: -15s; }

    @keyframes floatShape {
      0%, 100% { transform: translate(0, 0) rotate(0deg) scale(1); }
      25% { transform: translate(30px, -40px) rotate(10deg) scale(1.1); }
      50% { transform: translate(-20px, 20px) rotate(-5deg) scale(0.95); }
      75% { transform: translate(15px, 35px) rotate(8deg) scale(1.05); }
    }

    header {
      position: relative;
      z-index: 10;
      background: linear-gradient(135deg, var(--bg-card) 0%, var(--bg-card-alt) 100%);
      border-bottom: 3px solid;
      border-image: linear-gradient(90deg, var(--pop-pink), var(--pop-yellow), var(--pop-green), var(--pop-blue), var(--pop-purple)) 1;
      padding: 14px 24px;
    }

    .brand {
      display: flex;
      align-items: center;
      justify-content: space-between;
      max-width: 1200px;
      margin: 0 auto;
      flex-wrap: wrap;
      gap: 12px;
    }

    .brand-main {
      display: flex;
      align-items: center;
      gap: 14px;
    }

    .brand-logo {
      height: 52px;
      width: auto;
      filter: drop-shadow(0 2px 6px rgba(0,0,0,0.4));
    }

    .brand h1 {
      font-family: 'Fredoka', sans-serif;
      font-size: clamp(0.9rem, 2vw, 1.2rem);
      font-weight: 700;
      background: linear-gradient(90deg, var(--pop-yellow), var(--pop-orange), var(--pop-pink));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      line-height: 1.2;
    }

    .brand small {
      font-size: 0.72rem;
      color: var(--text-muted);
    }

    #loginBadge {
      font-size: 0.78rem;
      padding: 5px 14px;
      border-radius: 20px;
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.1);
      color: var(--text-muted);
      white-space: nowrap;
    }

    #loginBadge.logged-in {
      background: rgba(0,230,118,0.15);
      border-color: var(--pop-green);
      color: var(--pop-green);
    }

    main {
      position: relative;
      z-index: 5;
      max-width: 1200px;
      margin: 0 auto;
      padding: 28px 20px 60px;
    }

    .hero-section {
      position: relative;
      border-radius: var(--radius);
      overflow: hidden;
      margin-bottom: 24px;
      box-shadow: var(--shadow);
    }

    .hero-img {
      width: 100%;
      height: 240px;
      object-fit: cover;
      object-position: center top;
      display: block;
    }

    .hero-overlay {
      position: absolute;
      inset: 0;
      background: linear-gradient(to top, rgba(26,26,46,0.95) 0%, rgba(26,26,46,0.4) 50%, transparent 100%);
      display: flex;
      flex-direction: column;
      justify-content: flex-end;
      padding: 24px;
    }

    .hero-overlay h2 {
      font-family: 'Fredoka', sans-serif;
      font-size: clamp(1.3rem, 3.6vw, 2rem);
      font-weight: 700;
      margin-bottom: 6px;
      text-shadow: 0 2px 12px rgba(0,0,0,0.5);
    }

    .hero-overlay p { color: var(--text-muted); }

    .content-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
    }

    .card {
      background: var(--bg-card);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      overflow: hidden;
      border: 1px solid rgba(255,255,255,0.06);
    }

    .card-header {
      padding: 16px 20px 12px;
      display: flex;
      align-items: center;
      gap: 10px;
      border-bottom: 1px solid rgba(255,255,255,0.06);
    }

    .icon {
      width: 38px;
      height: 38px;
      border-radius: 11px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.2rem;
      flex-shrink: 0;
    }

    .card-header h3 {
      font-family: 'Fredoka', sans-serif;
      font-size: 1.05rem;
      font-weight: 600;
    }

    .card-body { padding: 16px 20px 20px; }

    input, select, button {
      width: 100%;
      padding: 10px 12px;
      border-radius: 10px;
      border: 2px solid rgba(255,255,255,0.1);
      background: rgba(0,0,0,0.25);
      color: var(--text-light);
      font-family: 'Nunito', sans-serif;
      font-size: 0.92rem;
      margin-bottom: 10px;
    }

    select option {
      color: #000;
      background: #fff;
    }

    input:focus, select:focus {
      outline: none;
      border-color: var(--pop-blue);
      box-shadow: 0 0 0 3px rgba(33,150,243,0.15);
    }

    button {
      border: none;
      background: linear-gradient(135deg, var(--pop-blue), var(--pop-purple));
      color: #fff;
      font-family: 'Fredoka', sans-serif;
      font-size: 0.92rem;
      font-weight: 600;
      cursor: pointer;
      transition: transform .15s;
    }

    button:hover { transform: translateY(-1px); }

    .logout-btn {
      background: linear-gradient(135deg, var(--pop-orange), var(--pop-pink));
      max-width: 220px;
    }

    #submitBtn {
      background: linear-gradient(135deg, var(--pop-green), var(--pop-blue));
    }

    .hidden { display: none !important; }

    .q {
      border-top: 1px solid rgba(255,255,255,0.12);
      padding: 12px 0;
      margin-top: 8px;
    }

    .q p { margin-bottom: 8px; }

    .q label {
      display: block;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 8px;
      padding: 8px 10px;
      margin-bottom: 6px;
      cursor: pointer;
    }

    .q input[type="radio"] {
      width: auto;
      margin-right: 6px;
      margin-bottom: 0;
      accent-color: var(--pop-green);
    }

    .ok { color: var(--pop-green); font-weight: 700; }
    .err { color: #ff6b6b; font-weight: 700; }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.9rem;
    }

    th, td {
      border-bottom: 1px solid rgba(255,255,255,0.12);
      text-align: left;
      padding: 8px;
      vertical-align: top;
    }

    th { color: var(--pop-yellow); font-family: 'Fredoka', sans-serif; }

    .full-width { grid-column: 1 / -1; }

    @media (max-width: 900px) {
      .content-grid { grid-template-columns: 1fr; }
      .hero-img { height: 180px; }
    }
  </style>
</head>
<body>
  <div class="bg-shapes">
    <span></span><span></span><span></span><span></span>
  </div>

  <header>
    <div class="brand">
      <div class="brand-main">
        <img class="brand-logo" src="images_school/logo.png" alt="Schullogo" />
        <div>
          <h1>GRUMI NT Testsystem</h1>
          <small>Grund- und Mittelschule am Sportpark</small>
        </div>
      </div>
      <div id="loginBadge" aria-live="polite">Nicht eingeloggt</div>
    </div>
  </header>

  <main>
    <div class="hero-section">
      <img class="hero-img" src="images_school/c32580bb-787e-48f5-960d-a51efb3737fd.png" alt="Schule" />
      <div class="hero-overlay">
        <h2>NT Leistungstest</h2>
        <p>Schüler-Login, einmaliger Testversuch, automatische Notenberechnung und Lehrerübersicht.</p>
      </div>
    </div>

    <div class="content-grid">
      <div class="card" id="loginCard">
        <div class="card-header">
          <div class="icon" style="background: linear-gradient(135deg, var(--pop-orange), var(--pop-pink));">🔐</div>
          <h3>Login</h3>
        </div>
        <div class="card-body">
          <input id="username" placeholder="Benutzername" />
          <input id="password" type="password" placeholder="Passwort" />
          <button onclick="login()">Einloggen</button>
          <p id="loginMsg"></p>
        </div>
      </div>

      <div class="card hidden" id="userCard">
        <div class="card-header">
          <div class="icon" style="background: linear-gradient(135deg, var(--pop-green), var(--pop-blue));">👤</div>
          <h3>Angemeldet</h3>
        </div>
        <div class="card-body">
          <p id="meText" style="margin-bottom:10px;"></p>
          <button class="logout-btn" onclick="logout()">Ausloggen</button>
        </div>
      </div>

      <div class="card hidden full-width" id="studentCard">
        <div class="card-header">
          <div class="icon" style="background: linear-gradient(135deg, var(--pop-yellow), var(--pop-orange));">🧪</div>
          <h3>Schülerbereich</h3>
        </div>
        <div class="card-body">
          <button onclick="loadTopics()">Themen laden</button>
          <select id="topicSelect"></select>
          <button onclick="startTest()">Test starten</button>
          <div id="questionsWrap"></div>
          <button id="submitBtn" class="hidden" onclick="submitTest()">Test abgeben</button>
          <p id="studentMsg"></p>
        </div>
      </div>

      <div class="card hidden full-width" id="teacherCard">
        <div class="card-header">
          <div class="icon" style="background: linear-gradient(135deg, var(--pop-purple), var(--pop-pink));">📊</div>
          <h3>Lehrerbereich</h3>
        </div>
        <div class="card-body">
          <button onclick="loadTeacherResults()">Ergebnisse laden</button>
          <div id="teacherWrap"></div>
        </div>
      </div>
    </div>
  </main>

  <script>
    const API = "";
    let token = localStorage.getItem("token") || "";
    let me = null;
    let currentQuestions = [];

    function setMsg(id, text, ok = false) {
      const el = document.getElementById(id);
      el.textContent = text;
      el.className = ok ? "ok" : "err";
    }

    async function api(path, options = {}) {
      const headers = options.headers || {};
      if (token) headers.Authorization = "Bearer " + token;
      if (!headers["Content-Type"] && options.body) headers["Content-Type"] = "application/json";
      const res = await fetch(API + path, { ...options, headers });
      const data = await res.json().catch(() => ({}));
      if (!res.ok) throw new Error(data.error || "Fehler");
      return data;
    }

    function showByRole() {
      const badge = document.getElementById("loginBadge");
      document.getElementById("userCard").classList.toggle("hidden", !me);
      document.getElementById("studentCard").classList.toggle("hidden", !me || me.role !== "student");
      document.getElementById("teacherCard").classList.toggle("hidden", !me || me.role !== "teacher");
      document.getElementById("loginCard").classList.toggle("hidden", !!me);

      if (me) {
        document.getElementById("meText").textContent = `${me.username} (${me.role})`;
        badge.textContent = "Eingeloggt";
        badge.classList.add("logged-in");
      } else {
        badge.textContent = "Nicht eingeloggt";
        badge.classList.remove("logged-in");
      }
    }

    async function login() {
      try {
        const username = document.getElementById("username").value.trim();
        const password = document.getElementById("password").value;
        const data = await api("/api/login", {
          method: "POST",
          body: JSON.stringify({ username, password })
        });
        token = data.token;
        me = data.user;
        localStorage.setItem("token", token);
        setMsg("loginMsg", "Login erfolgreich", true);
        showByRole();
      } catch (e) {
        setMsg("loginMsg", e.message);
      }
    }

    function logout() {
      token = "";
      me = null;
      localStorage.removeItem("token");
      currentQuestions = [];
      document.getElementById("questionsWrap").innerHTML = "";
      document.getElementById("submitBtn").classList.add("hidden");
      showByRole();
    }

    async function loadMe() {
      if (!token) return;
      try {
        const data = await api("/api/me");
        me = data.user;
      } catch {
        token = "";
        me = null;
        localStorage.removeItem("token");
      }
      showByRole();
    }

    async function loadTopics() {
      try {
        const topics = await api("/api/topics");
        const sel = document.getElementById("topicSelect");
        sel.innerHTML = "";
        for (const t of topics) {
          const opt = document.createElement("option");
          opt.value = t.id;
          opt.textContent = `${t.title} (${t.subject})`;
          sel.appendChild(opt);
        }

        const preferred = topics.find(t => (t.title || "").toLowerCase().includes("radioaktivit"));
        if (preferred) sel.value = preferred.id;

        setMsg("studentMsg", "Themen geladen", true);
      } catch (e) {
        setMsg("studentMsg", e.message);
      }
    }

    async function startTest() {
      try {
        const topicId = Number(document.getElementById("topicSelect").value);
        const data = await api(`/api/topics/${topicId}/questions`);
        currentQuestions = data.questions || [];
        const wrap = document.getElementById("questionsWrap");
        wrap.innerHTML = "";

        currentQuestions.forEach((q, i) => {
          const div = document.createElement("div");
          div.className = "q";
          div.innerHTML = `
            <p><strong>${i + 1}. ${q.question_text}</strong></p>
            <label><input type="radio" name="q_${q.id}" value="A" checked> A) ${q.option_a}</label>
            <label><input type="radio" name="q_${q.id}" value="B"> B) ${q.option_b}</label>
            <label><input type="radio" name="q_${q.id}" value="C"> C) ${q.option_c}</label>
            <label><input type="radio" name="q_${q.id}" value="D"> D) ${q.option_d}</label>
          `;
          wrap.appendChild(div);
        });

        document.getElementById("submitBtn").classList.remove("hidden");
        setMsg("studentMsg", "Test geladen. Bitte abgeben.", true);
      } catch (e) {
        setMsg("studentMsg", e.message);
      }
    }

    async function submitTest() {
      try {
        const topicId = Number(document.getElementById("topicSelect").value);
        const answers = currentQuestions.map(q => {
          const checked = document.querySelector(`input[name="q_${q.id}"]:checked`);
          return { questionId: q.id, selectedOption: checked ? checked.value : "A" };
        });

        const data = await api(`/api/topics/${topicId}/submit`, {
          method: "POST",
          body: JSON.stringify({ answers })
        });

        setMsg("studentMsg", `Gespeichert: ${data.correctAnswers}/${data.totalQuestions} | ${data.percent}% | Note ${data.grade}`, true);
        document.getElementById("submitBtn").classList.add("hidden");
      } catch (e) {
        setMsg("studentMsg", e.message);
      }
    }

    async function loadTeacherResults() {
      const wrap = document.getElementById("teacherWrap");
      wrap.innerHTML = "";
      try {
        const rows = await api("/api/teacher/results");
        if (!rows.length) {
          wrap.innerHTML = "<p>Noch keine Ergebnisse vorhanden.</p>";
          return;
        }

        let html = `
          <table>
            <thead>
              <tr>
                <th>Schüler</th><th>Klasse</th><th>Thema</th><th>Richtig</th><th>%</th><th>Note</th><th>Zeit</th>
              </tr>
            </thead>
            <tbody>
        `;
        for (const r of rows) {
          html += `
            <tr>
              <td>${r.student_username}</td>
              <td>${r.class_name || ""}</td>
              <td>${r.topic_title}</td>
              <td>${r.correct_answers}/${r.total_questions}</td>
              <td>${r.percent}</td>
              <td>${r.grade}</td>
              <td>${new Date(r.finished_at).toLocaleString("de-DE")}</td>
            </tr>
          `;
        }
        html += "</tbody></table>";
        wrap.innerHTML = html;
      } catch (e) {
        wrap.innerHTML = `<p class="err">${e.message}</p>`;
      }
    }

    loadMe();
  </script>
</body>
</html>
